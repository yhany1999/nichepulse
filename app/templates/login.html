{% extends "base.html" %}
{% block title %}Log in — NichePulse{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-slate-900">Welcome back</h1>
      <p class="text-slate-500 mt-2">Log in to your NichePulse account.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form method="post" action="/login" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input
            type="email" name="email" required autocomplete="email"
            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input
            type="password" name="password" required autocomplete="current-password"
            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
            placeholder="Your password"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 rounded-lg transition text-sm"
        >
          Log in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      Don't have an account?
      <a href="/signup" class="text-brand-600 font-medium hover:underline">Sign up</a>
    </p>

  </div>
</div>
{% endblock %}
